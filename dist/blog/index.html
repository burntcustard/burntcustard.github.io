<!DOCTYPE html>

<html lang="en">

<head>
  <title>burnt.io - Blog</title>
  <link href="/styles.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap&text=burnt.io" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Hi! My name's John, aka burntcustard. I’m a web developer at Lighthouse London, and a Computer Science (Games) graduate">
</head>

<body>
  <header class="container">
    <nav>
      <a href="/" class="home">burnt.io</a>

      <button
        class="menu"
        aria-expanded="true"
        aria-controls="nav-items"
        onclick="this.setAttribute('aria-expanded', this.getAttribute('aria-expanded') !== 'true')"
      >
        <svg
          viewBox="0 0 16 16"
          xmlns="http://www.w3.org/2000/svg"
          height="32"
          width="32"
        >
          <path d="M2 4 l12 0" />
          <path d="M2 8 l12 0" />
          <path d="M2 12 l12 0" />
        </svg>
      </button>

      <div id="nav-items">
        <a href="/projects" class="projects">Projects</a>
        <a href="/games" class="games">Games</a>
        <a href="/blog" aria-current="page" class="blog">Blog</a>
      </div>
    </nav>
  </header>

  <main class="blog">
    <header>
      <h1 class="container">Blog</h1>
    </header>

    <div class="listings">
      <article class="container">
        <h2><a href="/blog/example-a">Blog post aa heading</a></h2>
        <time datetime="2020-04-29">
          29th April 2020
        </time>
        <p class="excerpt">Test post A excerpt</p>
        <a class="read-more" href="/blog/example-a">Read more =></a>
      </article>
      
      <article class="container">
        <h2><a href="/blog/example-b">Blog post B heading</a></h2>
        <a class="read-more" href="/blog/example-b">Read more =></a>
      </article>
    </div>
  </main>
</body>

</html>
