<!DOCTYPE html>

<html lang="en">

<head>
  <title>burnt.io</title>
  <link href="/styles.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap&text=burnt.io" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1">

<body>

    <nav>

        aria-controls="nav-items"
        onclick="this.setAttribute('aria-expanded', this.getAttribute('aria-expanded') !== 'true')"
      >
        <svg
          viewBox="0 0 16 16"
          xmlns="http://www.w3.org/2000/svg"
          height="32"
          width="32"
        >
          <path d="M2 4 l12 0" />
          <path d="M2 8 l12 0" />
          <path d="M2 12 l12 0" />
        </svg>
      </button>

      <div id="nav-items">
        <a href="/projects" class="projects">Projects</a>
        <a href="/games" class="games">Games</a>
        <a href="/blog" class="blog">Blog</a>
      </div>
    </nav>
  </header>

  <main class="bio">
    <h1>About</h1>
    <div>
      <p>
        A bit more about me?
      </p>
    </div>
  </main>

</html>
