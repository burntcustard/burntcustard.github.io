<!DOCTYPE html>

<html lang="en">

<head>
  <title>burnt.io</title>
  <link href="/styles.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap&text=burnt.io" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1">

<body>

    <nav>
      <a href="/" class="home">burnt.io</a>

        aria-controls="nav-items"
        onclick="const expanded = this.getAttribute('aria-expanded') !== 'true'; this.setAttribute('aria-expanded', expanded); document.getElementById('nav-items').setAttribute('aria-hidden', !expanded); document.body.classList.toggle('menu-expanded', expanded);"
      >
        <svg
          viewBox="0 0 16 16"
          xmlns="http://www.w3.org/2000/svg"
          height="32"
          width="32"
        >
          <path d="M2 4 l12 0" />
          <path d="M2 8 l12 0" />
          <path d="M2 12 l12 0" />
        </svg>
      </button>

      <div id="nav-items">
        <a href="/projects" class="projects">Projects</a>
        <a href="/games" aria-current="page" class="games">Games</a>
        <a href="/blog" class="blog">Blog</a>
      </div>
    </nav>
  </header>

  <main>
    <header>
      <h1>Games</h1>
    </header>
    <div class="projects">
      <article>
        <div class="info">
          <div>
            <h2>20461-Dioretsa</h2>
            <p>Test</p>
          </div>
        </div>
        <div class="clickable">
          <a href="https://alfredand.kuoni.co.uk/">
            burnt.io/20461-dioretsa
          </a>
          <img src="img/kuoni-test.jpg">
        </div>
      </article>
      <article>
        <div class="info">
          <div>
            <h2>Alfred&</h2>
            <p>WordPress Frontend and some other words and stuff</p>
            <a href="https://alfredand.kuoni.co.uk/">alfredand.kuoni.co.uk</a>
          </div>
        </div>
        <div class="browser">
          <div class="viewport">
            <img src="img/kuoni-test.jpg">
          </div>
        </div>
      </article>
    </div>
  </main>
</body>

</html>
